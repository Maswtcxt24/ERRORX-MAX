<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ERRORX Sound Booster</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
overflow-x:hidden;
}

body{
background:#000;
font-family:'Orbitron',sans-serif;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow-x:hidden;
}

/* BACKGROUND GLOW */

.bg{
position:fixed;
width:400px;
height:400px;
border-radius:50%;
background:red;
filter:blur(120px);
opacity:0.15;
z-index:-1;
animation:move 8s infinite alternate ease-in-out;
}

.bg2{
right:-100px;
bottom:-100px;
}

.bg1{
left:-100px;
top:-100px;
}

@keyframes move{
0%{transform:translate(0,0);}
100%{transform:translate(40px,40px);}
}

/* MAIN BOX */

.container{
width:100%;
max-width:500px;
background:#050505;
border:2px solid red;
box-shadow:
0 0 15px red,
0 0 40px rgba(255,0,0,0.6);
padding:25px;
border-radius:18px;
overflow:hidden;
}

/* LOGO */

.logo{
text-align:center;
font-size:3rem;
font-weight:900;
color:#ff0000;
position:relative;
margin-bottom:10px;
text-shadow:
2px 0 cyan,
-2px 0 red;
animation:glitch 1s infinite;
}

@keyframes glitch{
0%{transform:translate(0);}
20%{transform:translate(-2px,2px);}
40%{transform:translate(-2px,-2px);}
60%{transform:translate(2px,2px);}
80%{transform:translate(2px,-2px);}
100%{transform:translate(0);}
}

.sub{
text-align:center;
color:#aaa;
margin-bottom:20px;
font-size:14px;
line-height:1.6;
}

/* STATUS */

.status{
background:#021902;
border:1px solid #00ff66;
padding:12px;
text-align:center;
color:#00ff66;
margin-bottom:20px;
border-radius:10px;
font-size:14px;
box-shadow:0 0 10px rgba(0,255,100,0.3);
}

/* INPUT */

.input-box{
margin-bottom:20px;
}

.input-box input{
width:100%;
padding:14px;
background:#0d0d0d;
border:1px solid red;
color:white;
font-size:15px;
outline:none;
border-radius:12px;
transition:0.3s;
}

.input-box input:focus{
box-shadow:0 0 15px red;
}

/* BUTTONS */

.btn{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
font-size:16px;
font-family:'Orbitron',sans-serif;
font-weight:bold;
cursor:pointer;
transition:0.25s;
text-decoration:none;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.btn:hover{
transform:scale(0.98);
}

.red{
background:#ff0000;
color:white;
box-shadow:0 0 15px rgba(255,0,0,0.6);
}

.green{
background:#00cc44;
color:white;
box-shadow:0 0 15px rgba(0,255,100,0.5);
}

.orange{
background:#ff8800;
color:black;
font-weight:900;
}

/* VIDEO */

.video-box{
margin-top:20px;
border:1px solid red;
border-radius:15px;
overflow:hidden;
background:black;
box-shadow:0 0 15px rgba(255,0,0,0.3);
}

video{
width:100%;
display:block;
background:black;
}

/* VOLUME */

.volume-area{
margin-top:25px;
}

.volume-title{
text-align:center;
font-size:22px;
margin-bottom:15px;
color:red;
text-shadow:0 0 10px red;
}

.slider{
width:100%;
appearance:none;
height:12px;
border-radius:30px;
background:#111;
outline:none;
overflow:hidden;
border:1px solid red;
}

.slider::-webkit-slider-thumb{
appearance:none;
width:22px;
height:22px;
border-radius:50%;
background:red;
cursor:pointer;
box-shadow:0 0 10px red;
}

.percent{
margin-top:12px;
text-align:center;
font-size:26px;
color:white;
}

/* FOOTER */

.footer{
margin-top:25px;
text-align:center;
font-size:13px;
color:#aaa;
line-height:1.7;
}

/* MOBILE FIX */

@media(max-width:600px){

.logo{
font-size:2.3rem;
}

.container{
padding:18px;
border-radius:14px;
}

.btn{
font-size:14px;
padding:14px;
}

.percent{
font-size:22px;
}

}

</style>
</head>

<body>

<div class="bg bg1"></div>
<div class="bg bg2"></div>

<div class="container">

<div class="logo">ERRORX</div>

<div class="sub">
SOUND BOOSTER SYSTEM<br>
BY MR TWILIGHT
</div>

<div class="status">
✅ ACCESS ACTIVE — Unlimited Booster Enabled
</div>

<div class="input-box">
<input type="text" placeholder="Paste YouTube Link Here">
</div>

<button class="btn red">
⚡ EXECUTE SYSTEM
</button>

<button class="btn red" onclick="toggleMusic()">
🎵 PLAY / PAUSE MUSIC
</button>

<a href="https://whatsapp.com/channel/0029Vb5isALI1rcah6CRXm3J"
target="_blank"
class="btn green">
🔥 JOIN ERRORX CHANNEL
</a>

<button class="btn orange">
🔐 Logout / Switch Account
</button>

<div class="video-box">
<video id="video" controls>
<source src="" type="video/mp4">
</video>
</div>

<div class="volume-area">

<div class="volume-title">
ERRORX BOOST CONTROL
</div>

<input
type="range"
min="0"
max="300"
value="100"
class="slider"
id="slider">

<div class="percent" id="percent">
100%
</div>

</div>

<div class="footer">
© 2026 Made by Abdullah Suleman (MR TWILIGHT)
</div>

</div>

<script>

const slider = document.getElementById("slider");
const percent = document.getElementById("percent");
const video = document.getElementById("video");

let audioContext;
let gainNode;
let source;

slider.oninput = function(){

percent.innerHTML = this.value + "%";

if(video){

if(!audioContext){

audioContext = new(window.AudioContext || window.webkitAudioContext)();

source = audioContext.createMediaElementSource(video);

gainNode = audioContext.createGain();

source.connect(gainNode);

gainNode.connect(audioContext.destination);

}

gainNode.gain.value = this.value / 100;

}

};

function toggleMusic(){

if(video.paused){
video.play();
}else{
video.pause();
}

}

</script>

</body>
</html>
