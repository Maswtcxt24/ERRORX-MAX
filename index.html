<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERRORX ENGINE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
overflow-x:hidden;
scroll-behavior:smooth;
}

body{
background:#000;
font-family:'Orbitron',sans-serif;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:15px;
position:relative;
}

/* BACKGROUND */

.bg{
position:fixed;
width:350px;
height:350px;
border-radius:50%;
filter:blur(120px);
opacity:0.18;
z-index:-1;
animation:float 8s infinite alternate ease-in-out;
}

.bg1{
background:red;
top:-100px;
left:-100px;
}

.bg2{
background:cyan;
bottom:-100px;
right:-100px;
}

@keyframes float{
0%{
transform:translate(0,0);
}
100%{
transform:translate(40px,40px);
}
}

/* MAIN CONTAINER */

.container{
width:100%;
max-width:520px;
background:#050505;
border:2px solid red;
border-radius:20px;
padding:22px;
box-shadow:
0 0 15px red,
0 0 40px rgba(255,0,0,0.5);
overflow:hidden;
}

/* LOGO */

.logo{
font-size:3rem;
font-weight:900;
text-align:center;
margin-bottom:10px;
color:red;
letter-spacing:3px;
text-shadow:
0 0 5px red,
0 0 15px red,
2px 0 cyan;
animation:glitch 1s infinite;
}

@keyframes glitch{
0%{transform:translate(0);}
20%{transform:translate(-2px,2px);}
40%{transform:translate(2px,-2px);}
60%{transform:translate(-2px,-1px);}
80%{transform:translate(2px,1px);}
100%{transform:translate(0);}
}

/* TEXT */

.sub{
text-align:center;
font-size:13px;
color:#aaa;
line-height:1.7;
margin-bottom:20px;
}

.wow{
text-align:center;
font-size:20px;
color:#00ff99;
margin-bottom:15px;
text-shadow:0 0 15px #00ff99;
animation:wow 1.2s infinite;
}

@keyframes wow{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

/* STATUS */

.status{
background:#021902;
border:1px solid #00ff66;
padding:12px;
border-radius:12px;
text-align:center;
font-size:13px;
margin-bottom:20px;
color:#00ff66;
box-shadow:0 0 12px rgba(0,255,100,0.3);
}

/* INPUTS */

.input-box{
margin-bottom:15px;
}

.input-box input,
.input-box input[type=file]{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid red;
background:#111;
color:white;
font-family:'Orbitron',sans-serif;
outline:none;
}

.input-box input:focus{
box-shadow:0 0 12px red;
}

input[type=file]::-webkit-file-upload-button{
background:red;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
font-family:'Orbitron',sans-serif;
margin-right:10px;
}

/* BUTTONS */

.btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
margin-top:14px;
cursor:pointer;
font-size:15px;
font-weight:bold;
font-family:'Orbitron',sans-serif;
transition:0.25s;
display:flex;
justify-content:center;
align-items:center;
gap:10px;
text-decoration:none;
}

.btn:hover{
transform:scale(0.98);
}

.red{
background:red;
color:white;
box-shadow:0 0 15px rgba(255,0,0,0.6);
}

.green{
background:#00cc44;
color:white;
box-shadow:0 0 15px rgba(0,255,100,0.5);
}

.orange{
background:#ff8800;
color:black;
font-weight:900;
}

/* VIDEO */

.video-box{
margin-top:20px;
border-radius:15px;
overflow:hidden;
border:1px solid red;
background:black;
box-shadow:0 0 15px rgba(255,0,0,0.3);
}

video{
width:100%;
display:block;
background:black;
}

/* VOLUME */

.volume-area{
margin-top:25px;
}

.volume-title{
text-align:center;
font-size:20px;
color:red;
margin-bottom:15px;
text-shadow:0 0 10px red;
}

.slider{
width:100%;
height:12px;
appearance:none;
background:#111;
border-radius:30px;
border:1px solid red;
outline:none;
}

.slider::-webkit-slider-thumb{
appearance:none;
width:24px;
height:24px;
border-radius:50%;
background:red;
cursor:pointer;
box-shadow:0 0 15px red;
}

.percent{
text-align:center;
margin-top:12px;
font-size:28px;
}

/* LOADING */

.loading{
display:none;
margin-top:20px;
text-align:center;
color:#00ffcc;
font-size:14px;
animation:blink 1s infinite;
}

@keyframes blink{
50%{
opacity:0.4;
}
}

/* FOOTER */

.footer{
margin-top:25px;
text-align:center;
font-size:12px;
line-height:1.7;
color:#888;
}

/* MOBILE */

@media(max-width:600px){

body{
padding:10px;
}

.container{
padding:18px;
border-radius:16px;
}

.logo{
font-size:2.3rem;
}

.btn{
font-size:14px;
padding:14px;
}

.percent{
font-size:24px;
}

.wow{
font-size:18px;
}

}

</style>
</head>

<body>

<div class="bg bg1"></div>
<div class="bg bg2"></div>

<div class="container">

<div class="logo">
ERRORX
</div>

<div class="sub">
CYBER AUDIO ENGINE<br>
BY MR TWILIGHT
</div>

<div class="wow">
⚡ WOW BOOST ACTIVATED ⚡
</div>

<div class="status" id="status">
✅ SYSTEM ONLINE — ERRORX ENGINE READY
</div>

<!-- YOUTUBE LINK -->

<div class="input-box">
<input type="text" id="youtubeInput" placeholder="Paste YouTube Link Here">
</div>

<!-- FILE UPLOAD -->

<div class="input-box">
<input type="file" id="fileInput" accept="video/*,audio/*">
</div>

<!-- BUTTONS -->

<button class="btn red" onclick="executeSystem()">
⚡ EXECUTE SYSTEM
</button>

<button class="btn red" onclick="toggleMusic()">
🎵 PLAY / PAUSE
</button>

<button class="btn red" id="convertBtn">
🎧 CONVERT TO MP3
</button>

<a id="downloadBtn"
class="btn green"
style="display:none;"
download="ERRORX-MP3.mp3">
⬇ DOWNLOAD MP3
</a>

<a href="https://whatsapp.com/channel/0029Vb5isALI1rcah6CRXm3J"
target="_blank"
class="btn green">
🔥 JOIN ERRORX CHANNEL
</a>

<button class="btn orange" onclick="logoutSystem()">
🔐 LOGOUT / SWITCH ACCOUNT
</button>

<!-- VIDEO -->

<div class="video-box">
<video id="video" controls></video>
</div>

<!-- VOLUME -->

<div class="volume-area">

<div class="volume-title">
ERRORX BOOST CONTROL
</div>

<input
type="range"
min="0"
max="300"
value="100"
class="slider"
id="slider">

<div class="percent" id="percent">
100%
</div>

</div>

<!-- LOADING -->

<div class="loading" id="loading">
⚡ CONVERTING VIDEO TO MP3...
</div>

<!-- FOOTER -->

<div class="footer">
© 2026 ERRORX ENGINE<br>
Made by Abdullah Suleman (MR TWILIGHT)
</div>

</div>

<!-- FFmpeg -->

<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/ffmpeg.min.js"></script>

<script>

/* ELEMENTS */

const slider = document.getElementById("slider");
const percent = document.getElementById("percent");
const video = document.getElementById("video");
const fileInput = document.getElementById("fileInput");
const loading = document.getElementById("loading");
const downloadBtn = document.getElementById("downloadBtn");
const statusBox = document.getElementById("status");

let audioContext;
let gainNode;
let source;
let uploadedFile;

/* FILE UPLOAD */

fileInput.addEventListener("change", function(e){

const file = e.target.files[0];

if(file){

uploadedFile = file;

const url = URL.createObjectURL(file);

video.src = url;

video.play();

statusBox.innerHTML =
"🔥 FILE LOADED SUCCESSFULLY";

}

});

/* VOLUME BOOSTER */

slider.oninput = function(){

percent.innerHTML = this.value + "%";

if(video){

if(!audioContext){

audioContext =
new(window.AudioContext ||
window.webkitAudioContext)();

source =
audioContext.createMediaElementSource(video);

gainNode =
audioContext.createGain();

source.connect(gainNode);

gainNode.connect(audioContext.destination);

}

gainNode.gain.value =
this.value / 100;

}

};

/* PLAY PAUSE */

function toggleMusic(){

if(video.paused){

video.play();

statusBox.innerHTML =
"🎵 MEDIA PLAYING";

}else{

video.pause();

statusBox.innerHTML =
"⏸ MEDIA PAUSED";

}

}

/* EXECUTE SYSTEM */

function executeSystem(){

statusBox.innerHTML =
"⚡ ERRORX ENGINE ACTIVATED";

document.querySelector(".wow")
innerHTML =
"🔥 CYBER BOOST ENABLED 🔥";

navigator.vibrate?.(200);

}

/* LOGOUT */

function logoutSystem(){

const ask = confirm(
"Do you want to logout?"
);

if(ask){

location.reload();

}

}

/* MP3 CONVERTER */

document.getElementById("convertBtn")
.addEventListener("click", async () => {

if(!uploadedFile){

alert("Upload video first!");

return;

}

loading.style.display = "block";

try{

const { createFFmpeg, fetchFile } = FFmpeg;

const ffmpeg = createFFmpeg({
log:true
});

await ffmpeg.load();

ffmpeg.FS(
'writeFile',
'input.mp4',
await fetchFile(uploadedFile)
);

await ffmpeg.run(
'-i',
'input.mp4',
'output.mp3'
);

const data = ffmpeg.FS(
'readFile',
'output.mp3'
);

const url = URL.createObjectURL(
new Blob(
[data.buffer],
{ type:'audio/mp3' }
)
);

downloadBtn.href = url;

downloadBtn.style.display = "flex";

loading.innerHTML =
"✅ MP3 READY TO DOWNLOAD";

statusBox.innerHTML =
"🎧 CONVERSION SUCCESSFUL";

}catch(error){

console.log(error);

loading.innerHTML =
"❌ CONVERSION FAILED";

statusBox.innerHTML =
"⚠ BROWSER NOT SUPPORTED";

alert(
"Converter failed on this browser!"
);

}

});

/* INIT */

percent.innerHTML =
slider.value + "%";

</script>

</body>
</html>
